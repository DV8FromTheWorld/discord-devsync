defaults:
  darwin:
    paths:
      claude_md: ~/repos/discord/CLAUDE.md
      kb: ~/repos/discord-kb
      skills: ~/.claude/skills
  linux:
    paths:
      claude_md: ~/workspaces/discord/CLAUDE.md
      kb: ~/workspaces/discord-kb
      skills: ~/.claude/skills

layers:
  core:
    description: Base config synced to all hosts
    skills: all
    dotfiles: true
    secrets: true

hosts: {}
