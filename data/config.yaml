defaults:
  darwin:
    paths:
      claude_md: ~/repos/discord/CLAUDE.md
      kb: ~/repos/discord-kb
      skills: ~/.claude/skills
  linux:
    paths:
      claude_md: ~/workspace/discord/CLAUDE.md
      kb: ~/workspace/discord-kb
      skills: ~/.claude/skills
layers:
  core:
    description: Base config synced to all hosts
    skills: all
    mcp: all
    dotfiles: true
    secrets: true
hosts:
  local:
    hostname: localhost
    platform: darwin
    layers:
      - core
  claude-code-alpha:
    hostname: claude-code-alpha.coder
    platform: linux
    layers:
      - core
  claude-code-beta:
    hostname: claude-code-beta.coder
    platform: linux
    layers:
      - core
  claude-code-charlie:
    hostname: claude-code-charlie.coder
    platform: linux
    layers:
      - core
  austin-keener-workspace2:
    hostname: austin-keener-workspace2.coder
    platform: linux
    layers:
      - core
